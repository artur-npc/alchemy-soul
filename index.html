<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Алхимия Души</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
  if (window.Telegram && window.Telegram.WebApp) {
    window.Telegram.WebApp.ready();
    window.Telegram.WebApp.expand();
  }
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0d1a;--bg2:#13132a;--bg3:#1a1a35;
  --accent:#7c6fff;--accent2:#4ecdc4;
  --text:#e8e6ff;--text2:#9b9bc4;
  --border:#2a2a50;--card:#17173a;
  --bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden}

/* SCREENS */
.screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s ease;z-index:1}
.screen.active{transform:translateX(0);z-index:2}
.screen.prev{transform:translateX(-30%)}

/* TOPBAR */
.topbar{flex-shrink:0;padding:12px 16px 10px;display:flex;align-items:center;gap:10px;background:var(--bg2);border-bottom:1px solid var(--border)}
.topbar-back{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--bg3);border:1px solid var(--border);cursor:pointer;font-size:1rem;flex-shrink:0}
.topbar-title{font-size:1rem;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topbar-sub{font-size:0.75rem;color:var(--text2)}

/* SCROLL CONTENT */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{width:3px}
.scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* BOTTOM TABS */
.tabs{flex-shrink:0;display:flex;background:var(--bg2);border-top:1px solid var(--border);padding-bottom:var(--bottom)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;cursor:pointer;gap:3px;transition:opacity .15s}
.tab .tab-icon{font-size:1.3rem}
.tab .tab-label{font-size:0.65rem;color:var(--text2);transition:color .15s}
.tab.active .tab-label{color:var(--accent)}
.tab.active .tab-icon{filter:drop-shadow(0 0 4px var(--accent))}

/* HOME SCREEN */
.hero{background:linear-gradient(135deg,#1a0a3a 0%,#0a1a3a 100%);padding:24px 16px 20px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(124,111,255,.2) 0%,transparent 70%)}
.hero h1{font-size:1.5rem;font-weight:700;background:linear-gradient(90deg,#a78bfa,#4ecdc4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:relative}
.hero .hero-meta{font-size:.78rem;color:var(--text2);margin-top:6px;position:relative}

.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.stat .n{font-size:1.6rem;font-weight:700;color:var(--accent)}
.stat .l{font-size:.75rem;color:var(--text2);margin-top:2px}

.section-head{padding:12px 16px 6px;font-size:.7rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2)}

.insight-item{margin:0 16px 10px;background:linear-gradient(135deg,rgba(124,111,255,.1),rgba(78,205,196,.06));border:1px solid rgba(124,111,255,.2);border-radius:10px;padding:14px 14px 14px 40px;font-size:.85rem;line-height:1.65;position:relative}
.insight-item::before{content:'💎';position:absolute;left:12px;top:13px}

/* TOPIC LIST */
.topic-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;-webkit-user-select:none}
.topic-row:active{background:var(--bg3)}
.topic-row .t-emoji{font-size:1.5rem;width:36px;text-align:center;flex-shrink:0}
.topic-row .t-info{flex:1;min-width:0}
.topic-row .t-title{font-size:.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topic-row .t-desc{font-size:.75rem;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topic-row .t-count{font-size:.72rem;background:var(--bg3);color:var(--text2);padding:3px 8px;border-radius:10px;flex-shrink:0}
.topic-row .t-arrow{color:var(--text2);font-size:.8rem;flex-shrink:0;margin-left:4px}

/* TIMELINE */
.tl-wrap{padding:16px}
.tl-item{position:relative;padding-left:24px;margin-bottom:16px}
.tl-item::before{content:'';position:absolute;left:5px;top:14px;bottom:-18px;width:2px;background:var(--border)}
.tl-item:last-child::before{display:none}
.tl-dot{position:absolute;left:0;top:10px;width:12px;height:12px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);box-shadow:0 0 6px rgba(124,111,255,.5)}
.tl-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;transition:border-color .2s}
.tl-card:active{border-color:var(--accent)}
.tl-date{font-size:.72rem;color:var(--accent2);margin-bottom:3px}
.tl-title{font-size:.9rem;font-weight:600}
.tl-desc{font-size:.78rem;color:var(--text2);margin-top:4px;line-height:1.5}

/* SEARCH */
.search-bar{padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
.search-bar input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:9px 16px;color:var(--text);font-size:.9rem;outline:none}
.search-bar input::placeholder{color:var(--text2)}
.search-bar input:focus{border-color:var(--accent)}

/* MESSAGES */
.message{padding:14px 16px;border-bottom:1px solid var(--border)}
.msg-meta{display:flex;gap:10px;margin-bottom:6px;font-size:.75rem;color:var(--text2)}
.msg-author{color:var(--accent2);font-weight:600}
.msg-text{font-size:.875rem;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.msg-text mark{background:rgba(124,111,255,.3);color:var(--text);border-radius:2px;padding:0 2px}

.empty{text-align:center;padding:48px 24px;color:var(--text2);font-size:.9rem}

/* PRACTICES */
.practice-item{margin:0 16px 10px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 12px 12px 32px;font-size:.85rem;line-height:1.5;position:relative}
.practice-item::before{content:'✦';position:absolute;left:11px;top:12px;color:var(--accent);font-size:.8rem}
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div class="screen active" id="screen-home">
  <div class="scroll">
    <div class="hero">
      <h1>✨ Алхимия Души ✨</h1>
      <div class="hero-meta" id="hero-meta"></div>
    </div>
    <div class="stats" id="stats"></div>
    <div class="section-head">Главные инсайты</div>
    <div id="insights"></div>
    <div class="section-head">Ключевые практики</div>
    <div id="practices"></div>
    <div style="height:16px"></div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="setTab('home')"><div class="tab-icon">🏠</div><div class="tab-label">Главная</div></div>
    <div class="tab" onclick="setTab('topics')"><div class="tab-icon">📚</div><div class="tab-label">Темы</div></div>
    <div class="tab" onclick="setTab('timeline')"><div class="tab-icon">📅</div><div class="tab-label">Дни</div></div>
    <div class="tab" onclick="setTab('search')"><div class="tab-icon">🔍</div><div class="tab-label">Поиск</div></div>
  </div>
</div>

<!-- TOPICS SCREEN -->
<div class="screen" id="screen-topics">
  <div class="topbar">
    <div class="topbar-title">Темы курса</div>
  </div>
  <div class="scroll" id="topics-list"></div>
  <div class="tabs">
    <div class="tab" onclick="setTab('home')"><div class="tab-icon">🏠</div><div class="tab-label">Главная</div></div>
    <div class="tab active" onclick="setTab('topics')"><div class="tab-icon">📚</div><div class="tab-label">Темы</div></div>
    <div class="tab" onclick="setTab('timeline')"><div class="tab-icon">📅</div><div class="tab-label">Дни</div></div>
    <div class="tab" onclick="setTab('search')"><div class="tab-icon">🔍</div><div class="tab-label">Поиск</div></div>
  </div>
</div>

<!-- TOPIC DETAIL SCREEN -->
<div class="screen" id="screen-topic-detail">
  <div class="topbar">
    <div class="topbar-back" id="topic-back">←</div>
    <div>
      <div class="topbar-title" id="topic-detail-title"></div>
      <div class="topbar-sub" id="topic-detail-sub"></div>
    </div>
  </div>
  <div class="scroll" id="topic-detail-messages"></div>
</div>

<!-- TIMELINE SCREEN -->
<div class="screen" id="screen-timeline">
  <div class="topbar">
    <div class="topbar-title">Хронология</div>
  </div>
  <div class="scroll">
    <div class="tl-wrap" id="timeline-list"></div>
  </div>
  <div class="tabs">
    <div class="tab" onclick="setTab('home')"><div class="tab-icon">🏠</div><div class="tab-label">Главная</div></div>
    <div class="tab" onclick="setTab('topics')"><div class="tab-icon">📚</div><div class="tab-label">Темы</div></div>
    <div class="tab active" onclick="setTab('timeline')"><div class="tab-icon">📅</div><div class="tab-label">Дни</div></div>
    <div class="tab" onclick="setTab('search')"><div class="tab-icon">🔍</div><div class="tab-label">Поиск</div></div>
  </div>
</div>

<!-- TIMELINE DAY DETAIL -->
<div class="screen" id="screen-day-detail">
  <div class="topbar">
    <div class="topbar-back" id="day-back">←</div>
    <div>
      <div class="topbar-title" id="day-detail-title"></div>
      <div class="topbar-sub" id="day-detail-sub"></div>
    </div>
  </div>
  <div class="scroll" id="day-detail-messages"></div>
</div>

<!-- SEARCH SCREEN -->
<div class="screen" id="screen-search">
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Поиск по сообщениям..." autocomplete="off"/>
  </div>
  <div class="scroll" id="search-results"><div class="empty">Введите запрос для поиска</div></div>
  <div class="tabs">
    <div class="tab" onclick="setTab('home')"><div class="tab-icon">🏠</div><div class="tab-label">Главная</div></div>
    <div class="tab" onclick="setTab('topics')"><div class="tab-icon">📚</div><div class="tab-label">Темы</div></div>
    <div class="tab" onclick="setTab('timeline')"><div class="tab-icon">📅</div><div class="tab-label">Дни</div></div>
    <div class="tab active" onclick="setTab('search')"><div class="tab-icon">🔍</div><div class="tab-label">Поиск</div></div>
  </div>
</div>

<script src="data.js"></script>
<script>
function h(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function hl(text, q) {
  if (!q) return h(text);
  return h(text).replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
}

// --- NAV ---
let currentTab = 'home';
const screenMap = {home:'screen-home',topics:'screen-topics',timeline:'screen-timeline',search:'screen-search'};

function setTab(tab) {
  // deactivate old
  document.getElementById(screenMap[currentTab]).classList.remove('active');
  document.querySelectorAll('#screen-'+currentTab+' .tab').forEach(t=>t.classList.remove('active'));
  // close detail screens
  ['screen-topic-detail','screen-day-detail'].forEach(id=>{
    document.getElementById(id).classList.remove('active','prev');
  });
  currentTab = tab;
  document.getElementById(screenMap[tab]).classList.add('active');
  document.querySelectorAll('#screen-'+tab+' .tab[onclick*="\''+tab+'\'"]').forEach(t=>t.classList.add('active'));
  if (tab === 'search') setTimeout(()=>document.getElementById('search-input').focus(), 300);
}

function openDetail(screenId, fromScreenId) {
  const from = document.getElementById(fromScreenId);
  const to = document.getElementById(screenId);
  from.classList.add('prev');
  to.classList.add('active');
}
function closeDetail(screenId, toScreenId) {
  document.getElementById(screenId).classList.remove('active');
  document.getElementById(toScreenId).classList.remove('prev');
}

// --- RENDER HOME ---
function renderHome(data) {
  document.getElementById('hero-meta').textContent =
    data.period.start + ' — ' + data.period.end + ' · ' + data.participants.length + ' участников';

  const allMsgs = data.topics.reduce((s,t)=>s+(t.messages||[]).length,0);
  document.getElementById('stats').innerHTML =
    '<div class="stat"><div class="n">'+data.timeline.length+'</div><div class="l">дней</div></div>'+
    '<div class="stat"><div class="n">'+data.topics.length+'</div><div class="l">тем</div></div>'+
    '<div class="stat"><div class="n">'+allMsgs+'</div><div class="l">сообщений</div></div>'+
    '<div class="stat"><div class="n">'+data.key_practices.length+'</div><div class="l">практик</div></div>';

  document.getElementById('insights').innerHTML =
    data.key_insights.map(i=>'<div class="insight-item">'+h(i)+'</div>').join('');

  document.getElementById('practices').innerHTML =
    data.key_practices.map(p=>'<div class="practice-item">'+h(p)+'</div>').join('');
}

// --- RENDER TOPICS ---
function renderTopics(data) {
  document.getElementById('topics-list').innerHTML =
    data.topics.map((t,i)=>
      '<div class="topic-row" onclick="openTopic('+i+')">'+
        '<div class="t-emoji">'+t.emoji+'</div>'+
        '<div class="t-info">'+
          '<div class="t-title">'+h(t.title)+'</div>'+
          '<div class="t-desc">'+h(t.description)+'</div>'+
        '</div>'+
        '<div class="t-count">'+(t.messages||[]).length+'</div>'+
        '<div class="t-arrow">›</div>'+
      '</div>'
    ).join('');
}

function openTopic(idx) {
  const t = DATA.topics[idx];
  document.getElementById('topic-detail-title').textContent = t.emoji + ' ' + t.title;
  document.getElementById('topic-detail-sub').textContent = (t.messages||[]).length + ' сообщений';
  document.getElementById('topic-detail-messages').innerHTML =
    (t.messages||[]).map(m=>renderMsg(m)).join('') || '<div class="empty">Нет сообщений</div>';
  openDetail('screen-topic-detail','screen-topics');
}

document.getElementById('topic-back').onclick = () => closeDetail('screen-topic-detail','screen-topics');

// --- RENDER TIMELINE ---
function renderTimeline(data) {
  document.getElementById('timeline-list').innerHTML =
    data.timeline.map((ev,i)=>
      '<div class="tl-item">'+
        '<div class="tl-dot"></div>'+
        '<div class="tl-card" onclick="openDay('+i+')">'+
          '<div class="tl-date">'+h(ev.date)+'</div>'+
          '<div class="tl-title">'+h(ev.title)+'</div>'+
          '<div class="tl-desc">'+h(ev.description)+'</div>'+
        '</div>'+
      '</div>'
    ).join('');
}

function openDay(idx) {
  const ev = DATA.timeline[idx];
  const msgMap = {};
  DATA.topics.forEach(t=>(t.messages||[]).forEach(m=>{msgMap[m.id]=m;}));
  const msgs = (ev.message_ids||[]).map(id=>msgMap[id]).filter(Boolean);
  document.getElementById('day-detail-title').textContent = ev.title;
  document.getElementById('day-detail-sub').textContent = ev.date + ' · ' + msgs.length + ' сообщ.';
  document.getElementById('day-detail-messages').innerHTML =
    msgs.map(m=>renderMsg(m)).join('') || '<div class="empty">Нет сообщений</div>';
  openDetail('screen-day-detail','screen-timeline');
}

document.getElementById('day-back').onclick = () => closeDetail('screen-day-detail','screen-timeline');

// --- SEARCH ---
let searchTimer;
document.getElementById('search-input').addEventListener('input', function() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(()=>doSearch(this.value), 200);
});

function doSearch(q) {
  const container = document.getElementById('search-results');
  if (!q.trim()) { container.innerHTML = '<div class="empty">Введите запрос для поиска</div>'; return; }
  const ql = q.toLowerCase();
  const seen = new Set();
  const results = DATA.topics.flatMap(t=>t.messages||[]).filter(m=>{
    if (seen.has(m.id)) return false;
    seen.add(m.id);
    return m.text.toLowerCase().includes(ql);
  });
  if (!results.length) { container.innerHTML = '<div class="empty">Ничего не найдено по «'+h(q)+'»</div>'; return; }
  container.innerHTML = '<div style="padding:10px 16px;font-size:.78rem;color:var(--text2)">Найдено: '+results.length+'</div>'+
    results.map(m=>renderMsg(m,q)).join('');
}

// --- MSG ---
function renderMsg(m, q) {
  return '<div class="message">'+
    '<div class="msg-meta">'+
      '<span class="msg-author">'+h(m.author||'Лера')+'</span>'+
      '<span>'+(m.date||'').split(' ')[0]+'</span>'+
    '</div>'+
    '<div class="msg-text">'+hl(m.text, q||'')+'</div>'+
  '</div>';
}

// --- INIT ---
renderHome(DATA);
renderTopics(DATA);
renderTimeline(DATA);
</script>
</body>
</html>
