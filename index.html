<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d1a;
    --bg2: #13132a;
    --bg3: #1a1a35;
    --accent: #7c6fff;
    --accent2: #4ecdc4;
    --text: #e8e6ff;
    --text2: #9b9bc4;
    --border: #2a2a50;
    --card: #17173a;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #1a0a3a 0%, #0a1a3a 100%);
    border-bottom: 1px solid var(--border);
    padding: 32px 24px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(124,111,255,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  header h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 2px;
    background: linear-gradient(90deg, #a78bfa, #4ecdc4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header .meta {
    margin-top: 8px;
    color: var(--text2);
    font-size: 0.85rem;
    letter-spacing: 1px;
  }

  /* SEARCH */
  .search-wrap {
    padding: 16px 24px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .search-wrap input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    color: var(--text);
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text2); }

  /* LAYOUT */
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 140px);
  }

  /* SIDEBAR */
  aside {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    padding: 16px 0;
    position: sticky;
    top: 0;
    height: calc(100vh - 140px);
    overflow-y: auto;
  }
  aside::-webkit-scrollbar { width: 4px; }
  aside::-webkit-scrollbar-track { background: transparent; }
  aside::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .nav-section {
    padding: 8px 16px 4px;
    font-size: 0.7rem;
    letter-spacing: 1.5px;
    color: var(--text2);
    text-transform: uppercase;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px;
    cursor: pointer;
    border-radius: 0;
    transition: background 0.15s;
    border-left: 3px solid transparent;
    font-size: 0.88rem;
  }
  .nav-item:hover { background: var(--bg3); }
  .nav-item.active {
    background: rgba(124,111,255,0.12);
    border-left-color: var(--accent);
    color: #a78bfa;
  }
  .nav-item .emoji { font-size: 1rem; min-width: 20px; }
  .nav-item .label { flex: 1; }
  .nav-item .count {
    font-size: 0.72rem;
    background: var(--bg3);
    color: var(--text2);
    padding: 2px 6px;
    border-radius: 10px;
  }

  /* MAIN */
  main {
    padding: 24px;
    overflow-y: auto;
  }

  /* OVERVIEW */
  .overview {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .stat-card .num {
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-card .label { color: var(--text2); font-size: 0.85rem; margin-top: 4px; }

  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
    grid-column: 1/-1;
    line-height: 1.7;
    color: var(--text2);

    margin-bottom: 16px;

    align-items: center;
    gap: 8px;

    content: '';
    flex: 1;
    height: 1px;

    align-items: center;
    gap: 12px;
    padding: 16px 20px;

    transition: background 0.15s;

  .topic-emoji { font-size: 1.4rem; }

  .topic-desc { color: var(--text2); font-size: 0.83rem; margin-top: 2px; }
  .topic-toggle {
    color: var(--text2);
    font-size: 0.8rem;
    padding: 4px 10px;
    background: var(--bg3);
    border-radius: 20px;
    border: 1px solid var(--border);
    cursor: pointer;
    white-space: nowrap;
  }
  .topic-messages {
    display: none;
    border-top: 1px solid var(--border);

  .topic-messages.open { display: block; }

  /* MESSAGE */
  .message {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .message:hover { background: rgba(255,255,255,0.02); }
  .message-meta {

    gap: 12px;
    margin-bottom: 8px;
    font-size: 0.78rem;
    color: var(--text2);
  }
  .message-author { color: var(--accent2); font-weight: 600; }
  .message-text {
    font-size: 0.88rem;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .message-text mark {
    background: rgba(124,111,255,0.3);
    color: var(--text);
    border-radius: 2px;
    padding: 0 2px;
  }

  /* TIMELINE */
  .timeline {
    position: relative;
    padding-left: 28px;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 8px;
    top: 8px;
    bottom: 8px;
    width: 2px;
    background: linear-gradient(180deg, var(--accent) 0%, var(--accent2) 100%);
    opacity: 0.3;
  }
  .tl-item {
    position: relative;
    margin-bottom: 20px;
  }
  .tl-item::before {
    content: '';
    position: absolute;
    left: -24px;
    top: 16px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--bg);
    box-shadow: 0 0 8px rgba(124,111,255,0.6);
  }
  .tl-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .tl-card:hover { border-color: var(--accent); }
  .tl-date { font-size: 0.75rem; color: var(--accent2); margin-bottom: 4px; }
  .tl-title { font-weight: 600; font-size: 0.95rem; }
  .tl-desc { color: var(--text2); font-size: 0.82rem; margin-top: 4px; line-height: 1.5; }
  .tl-messages { display: none; padding-top: 12px; }
  .tl-messages.open { display: block; }

  /* PRACTICES */
  .practices-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 24px;
  }
  .practice-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 0.85rem;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .practice-item::before {
    content: '✦';
    color: var(--accent);
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* INSIGHTS */
  .insights-list { display: flex; flex-direction: column; gap: 12px; }
  .insight-item {
    background: linear-gradient(135deg, rgba(124,111,255,0.08) 0%, rgba(78,205,196,0.05) 100%);
    border: 1px solid rgba(124,111,255,0.2);
    border-radius: 10px;
    padding: 16px;
    font-size: 0.88rem;
    line-height: 1.7;
    position: relative;
    padding-left: 40px;
  }
  .insight-item::before {
    content: '💎';
    position: absolute;
    left: 12px;
    top: 14px;
  }

  /* SEARCH RESULTS */
  .search-results { display: none; }
  .search-results.visible { display: block; }
  .no-results { text-align: center; padding: 48px; color: var(--text2); }

  /* VIEW SWITCHER */
  .view { display: none; }
  .view.active { display: block; }

  /* PARTICIPANTS */
  .participants {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }
  .participant {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.8rem;
    color: var(--text2);
  }

  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    aside { display: none; }
    .overview { grid-template-columns: 1fr 1fr; }
    .practices-grid { grid-template-columns: 1fr; }
  }
</style>

, {"id": "candles", "title": "Работа со свечами и настройки", "description": "Ежедневный ритуал с двумя свечами: первая — активация жизненной энергии, вторая — открытие жизненных дорог. Практика сопровождается произнесением аффирмаций.", "emoji": "🕯️", "message_ids": [174912, 175006, 175416, 175425, 175434, 175478], "messages": [{"id": 174912, "date": "15.03.2026 08:14:16 UTC+00:00", "author": "Лера", "text": "РАБОТА С ОГНЁМ И ВОСКОМ 🕯️ НАСТРОЙКА И АКТИВАЦИЯ 🕯️ \n\nС этого момента 1-2 раза\nв день вам предстоит зажигать две свечи и так \nдо конца нашего курса. (желательно утром и вечером)  \n\n1️⃣ Первая свеча будет соответствовать вашей индивидуальной настройке.\n\nЗажигая 1-ую свечу вы произносите:\n\n «Я активирую и пробуждаю свою жизненную энергию.»\n\n2️⃣ Вторая свеча будет связана со следующей настройкой: \n\n«ДА, мои жизненные дороги открываются.\nДа, пути возможностей проявляются для меня.\nДА, все негативные программы, ограничения, страхи и внутренние блоки, мешающие открытию моих жизненных дорог, моему движению и предназначению с любовью и в согласии со своей Душой, трансформированы, трансмутированы и аннулированы внутри меня,\nчерез меня и вокруг меня,в пространстве и во времени, и вне пространства, и вне времени — здесь и сейчас.—\nДа будет так, так и будет.\nАминь.»\n\nРекомендуется использовать восковые свечи. Свечи должны догореть до конца.\n\n❤️"}, {"id": 175006, "date": "18.03.2026 10:09:04 UTC+00:00", "author": "Лера", "text": "🕯️ Настройка на сегодня и завтра :\n \n« Исцеление и гармонизация мужской и женской энергии внутри меня , через меня и вокруг меня! здесь и сейчас! Да будет так так и будет, Аминь»"}, {"id": 175425, "date": "28.03.2026 12:48:34 UTC+00:00", "author": "Лера", "text": "1 свеча \n\n🕯️ «Да все негативные и деструктивные программы... растворены, исцелены, трансформированы, трансмутированы, аннулированы... здесь и сейчас! Да будет так так и будет аминь! 🙏🏼\n\n2 Свеча 🕯️ \n\nИсцеление, растворение, трансформация причины деструкции, болей, обид и искажений в моей мужской энергии и родовой системе... здесь и сейчас. Да будет так. Так и будет Аминь."}, {"id": 175434, "date": "28.03.2026 17:20:30 UTC+00:00", "author": "Лера", "text": "1 Свеча 🕯️ \n\nИсцеление и выздоровление моего тонкого и физического плана. Здесь и сейчас. \nДа будет так. \nТак и будет. Аминь.\n\n2 Свеча 🕯️ \n\nОчищение, исцеление и восстановление всех моих тонких полей, всех моих энергетических центров и всего моего физического тела. Здесь и сейчас. \nДа будет так. \nТак и будет. \nАминь."}, {"id": 175478, "date": "29.03.2026 16:45:14 UTC+00:00", "author": "Лера", "text": "Настройка 🕯️\n\nИсцеление причины моей острой ситуации (думаете о ситуации либо проговариваете её) на здесь и сейчас. Да будет так. Так и будет. Аминь."}]}, {"id": "meditations", "title": "Медитации", "description": "Комплекс медитаций для повышения вибраций, расширения энергии и работы с телом света. Включает медитации Планета состояния, Храм Души, Звёздный дождь.", "emoji": "🧘", "message_ids": [174921, 174956, 174957, 174958, 174959, 175362], "messages": [{"id": 174921, "date": "16.03.2026 09:00:50 UTC+00:00", "author": "Лера", "text": "Активация жизненных сил  и расширение энергии"}, {"id": 174956, "date": "16.03.2026 17:50:11 UTC+00:00", "author": "Лера", "text": "Медитация \"Планета состояния\" ✨🙏🏻 5 день / перед сном"}, {"id": 174957, "date": "16.03.2026 17:50:11 UTC+00:00", "author": "Лера", "text": "Медитация перед снов «Храм Души» 🧘🏼‍♀️❤️"}, {"id": 174958, "date": "16.03.2026 17:50:11 UTC+00:00", "author": "Лера", "text": "Медитация/завершение дня 🌙\n\n«ЗВЁЗДНЫЙ ДОЖДЬ»"}, {"id": 174959, "date": "16.03.2026 17:50:57 UTC+00:00", "author": "Лера", "text": "Медитации перед сном! 💤 \nЕсли хочется можете добавлять себе медитацию перед сном.❤️"}, {"id": 175362, "date": "27.03.2026 08:33:36 UTC+00:00", "author": "Лера", "text": "Изумруд вашего сердца"}]}, {"id": "three-stars", "title": "Практика «3 Звезды» и Тело Света", "description": "Базовая ежедневная практика курса. Тело Света — работа с тремя энергетическими звёздами тела. Обязательна к выполнению каждый день.", "emoji": "⭐", "message_ids": [174966, 174974, 174992, 175007, 175039, 175195], "messages": [{"id": 174966, "date": "17.03.2026 08:17:34 UTC+00:00", "author": "Лера", "text": "Тема 1️⃣: Тело Света! 3 звезды.\nОбязательно для прослушивания!"}, {"id": 174974, "date": "17.03.2026 08:52:47 UTC+00:00", "author": "Лера", "text": "Тема 2️⃣: Правда к себе. Световые потоки. \nОбщий поток с поля.\n144.000 меридиана."}, {"id": 174992, "date": "18.03.2026 06:53:33 UTC+00:00", "author": "Лера", "text": "Всем Доброе утро!☀️ \nНе забываем, что с сегодняшнего дня мы \nначинаем выполнять ежедневно:\n\n1. Практика 3 звезды ⭐️ \n2. Настройки 🕯️"}, {"id": 175007, "date": "18.03.2026 10:25:12 UTC+00:00", "author": "Лера", "text": "И так что делаем сегодня и завтра!\n\n1. Практика 3 Звезды ⭐️ \n2. Настройка на гармонизацию мужской и женской энергий \n3. Практика «мужское и женское»"}, {"id": 175039, "date": "20.03.2026 05:07:12 UTC+00:00", "author": "Лера", "text": "Доброе утро!\nСегодня делаем:\n\n1. Упражнение 3 звезды ⭐️\n2. Любая настройка🕯️ \n3. Практика, которая откликается."}, {"id": 175195, "date": "23.03.2026 05:56:26 UTC+00:00", "author": "Лера", "text": "Доброе утро!\nНапоминаю про выполнение: \n\n1. Упражнение 3 звезды ⭐️\n2. Настройка🕯️ \n3. Работа с чакрами."}]}, {"id": "masculine-feminine", "title": "Мужское и женское", "description": "Тема гармонизации мужской и женской энергии внутри человека. Работа с дисбалансом через медитации и специальные настройки.", "emoji": "☯️", "message_ids": [174999, 175006, 175007, 175009], "messages": [{"id": 174999, "date": "18.03.2026 08:39:41 UTC+00:00", "author": "Лера", "text": "Тема: мужское и женское 1"}, {"id": 175006, "date": "18.03.2026 10:09:04 UTC+00:00", "author": "Лера", "text": "🕯️ Настройка на сегодня и завтра :\n \n« Исцеление и гармонизация мужской и женской энергии внутри меня , через меня и вокруг меня! здесь и сейчас! Да будет так так и будет, Аминь»"}, {"id": 175009, "date": "18.03.2026 10:41:05 UTC+00:00", "author": "Лера", "text": "*Дополнение\nКому было интересна тема про точки меридианов"}]}, {"id": "chakras", "title": "Чакры", "description": "Подробное изучение чакровой системы. Особый акцент на Муладхаре (корневой чакре) — фундаменте, безопасности и здоровье.", "emoji": "🌀", "message_ids": [175153, 175160, 175167, 175197], "messages": [{"id": 175153, "date": "22.03.2026 12:38:00 UTC+00:00", "author": "Лера", "text": "Муладхара\n1-чакра\n(Здоровье,безопасность)\nКорневая чакра (место-копчик) орган - надпочечники\n\nОпора. Фундамент.\n\nЧерез данный центр активизируются все энергетические каналы.\nРегулируется функциональная деятельность ног - движение.\n\nБлокирует чувство страха.\nСкупость, жадность, корысть.\n\nДанная чакра имеет самую материальную энергетику.\nОна связана с самыми главными инстинктами и потребностями человека: здоровьем, безопасностью, физическим существованием, самосохранением.\n\nЧакра заблокирована, если:\nВы полны страхов, сомнений, беспокойств;\nСклонны к различным фобиям;\nЧасто испытываете агрессию, раздражительность;\nВы неуверенны в себе, не ощущаете ответственность за свою жизнь;\nИмеете заболевания органов, расположенных в области данной чакры."}, {"id": 175160, "date": "22.03.2026 13:35:20 UTC+00:00", "author": "Лера", "text": "Энергия и активация \n1"}, {"id": 175167, "date": "22.03.2026 14:25:14 UTC+00:00", "author": "Лера", "text": "Для тех, у кого код судьбы 1,2,10,11,12,20,21,22"}, {"id": 175197, "date": "23.03.2026 06:15:22 UTC+00:00", "author": "Лера", "text": "Дополнение про чакры"}]}, {"id": "color-symbolism", "title": "Цветовая символика", "description": "Язык цветов как система энергетических значений: от красного (физическая энергия) до фиолетового (энергия разума).", "emoji": "🌈", "message_ids": [175077], "messages": [{"id": 175077, "date": "21.03.2026 12:43:25 UTC+00:00", "author": "Лера", "text": "ЯЗЫК ЦВЕТОВОЙ СИМВОЛИКИ\nКрасный — знак пассивной, физической энергии, женский род.\nОранжевый — знак воспроизводящей энергии.\nЖелтый - знак энергии пищеварения, а также знак силы.\nЗеленый — знак энергии человеческого сердца.\nГолубой - знак энергии здоровья, обмена веществ, хороших эмоций.\nСиний — знак энергии материи ума, «Читты».\nФиолетовый — знак энергии материи разума, «Брахмана»."}]}, {"id": "life-path", "title": "Жизненный путь и планеты рождения", "description": "Нумерологический и астрологический анализ жизненного пути. Коды судьбы и их связь с планетами.", "emoji": "☀️", "message_ids": [175107, 175111, 175167], "messages": [{"id": 175107, "date": "22.03.2026 06:55:07 UTC+00:00", "author": "Лера", "text": "Жизненный путь и направление ☀️"}, {"id": 175111, "date": "22.03.2026 07:18:15 UTC+00:00", "author": "Лера", "text": "Расшифровки и дополнения по жизненному пути. Планеты рождения."}]}, {"id": "prosperity", "title": "Деньги и процветание", "description": "Практики для привлечения финансового изобилия: очищение пространства, денежные магниты, работа с убеждением «деньги — это грязь», обет бедности.", "emoji": "💰", "message_ids": [175303, 175307, 175310, 175331], "messages": [{"id": 175303, "date": "26.03.2026 07:25:28 UTC+00:00", "author": "Лера", "text": "Освободите пространство для процветания: избавьтесь от старого и привлеките денежную энергию!\n\n1️⃣ Декадировка всего, что зависло и отжило в поле...\n2️⃣ В течение 10 дней проведите генеральную уборку...\n3️⃣ Начните создавать денежные магниты в каждом уголке вашего дома...\n4️⃣ Важно избавиться от негативной установки, что «деньги - это грязь»..."}, {"id": 175331, "date": "26.03.2026 12:34:04 UTC+00:00", "author": "Лера", "text": "Обет бедности"}]}, {"id": "cognitive-switches", "title": "Когнитивные переключатели", "description": "Четыре ключевые фразы для управления реальностью: «МИМО МЕНЯ», «МОЁ. МНЕ НРАВИТСЯ, БЕРУ!», «ОТМЕНЯЮ!», «ОПЛАЧЕНО».", "emoji": "💎", "message_ids": [175371], "messages": [{"id": 175371, "date": "27.03.2026 09:14:07 UTC+00:00", "author": "Лера", "text": "Фразы «когнитивные переключатели».\n\nОни помогают вовремя остановить поток негатива, перехватить управление своими мыслями и сменить роль жертвы на роль автора своей жизни.\n\n📚 1. «МИМО МЕНЯ» — щит от информационного шума.\n📚 2. «МОЁ. МНЕ НРАВИТСЯ, БЕРУ!» — магнит для возможностей.\n📚 3. «ОТМЕНЯЮ!» — ластик для деструктивных мыслей.\n📚 4. «ОПЛАЧЕНО» — способ закрыть долги прошлого."}]}, {"id": "ananda-khanda", "title": "Ананда Кханда", "description": "Сакральный энергетический центр в правой части грудной клетки — «Обитель Блаженства». Портал перехода от индивидуального «Я» к универсальному бытию.", "emoji": "🩵", "message_ids": [175360, 175374], "messages": [{"id": 175360, "date": "27.03.2026 07:09:16 UTC+00:00", "author": "Лера", "text": "Ананда Кханда: Эфирный Узел Сакральной Синхроничности\n\nВ сакральной географии тонкого тела Ананда Кханда (в переводе с санскрита — «Обитель Блаженства») представляет собой уникальный энергетический центр, расположенный симметрично физическому сердцу, в правой части грудной клетки..."}, {"id": 175374, "date": "27.03.2026 09:45:55 UTC+00:00", "author": "Лера", "text": "Сакральный резонанс через мелодию, пробуждающий Храм Сердца и разжигающий танец Ананда Тханды — вечный танец творения и блаженства внутри.\n\n🩵"}]}, {"id": "healing-samsara", "title": "Исцеление и Сансара", "description": "Принцип коррекции жизненных ситуаций: замена вопроса «За что?» на «Для чего?». Выход из круга Сансары через осознанность и принятие.", "emoji": "🎡", "message_ids": [175467, 175472, 175521, 175527, 175531], "messages": [{"id": 175467, "date": "29.03.2026 14:56:49 UTC+00:00", "author": "Лера", "text": "ПРИНЦИП КОРРЕКЦИИ ЖИЗНЕННЫХ СИТУАЦИЙ\n\nЭтап 1: Принятие — Любое событие изначально нейтрально.\nЭтап 2: Смена вопроса — «Для чего?» вместо «За что?»\nЭтап 3: Поиск решения — синтез старого и нового опыта.\nЭтап 4: Весомость и Невесомость — баланс между сопротивлением и принятием."}, {"id": 175472, "date": "29.03.2026 16:20:42 UTC+00:00", "author": "Лера", "text": "Новая тема: реакция или отношение\nСогласие — СО ГЛАСОМ СВОЕЙ ДУШИ"}, {"id": 175521, "date": "30.03.2026 07:34:57 UTC+00:00", "author": "Лера", "text": "🎡 Круг Сансары: Ловушка повторений или Школа Души?\n\nСансара — это бесконечный цикл «наступания на одни и те же грабли»...\n\nТри «цепи», которые держат нас в круге:\n1. Невежество\n2. Привязанность\n3. Гнев\n\nВыход: Момент Осознанности — выбор Отношения вместо Реакции."}, {"id": 175527, "date": "30.03.2026 08:28:12 UTC+00:00", "author": "Лера", "text": "📜 Золотое правило\n\n«Болезнь — это Весомость невыученного урока. Исцеление — это Невесомость осознанного пути».\n\nТри столпа практики:\n1. Приоритет «Для чего» над «Почему»\n2. Смерть Своеволия\n3. Совпадение как Ключ"}, {"id": 175531, "date": "30.03.2026 12:14:15 UTC+00:00", "author": "Лера", "text": "Как выйти из круга Сансары. 🎡 \nВ потоке завершения. \nОбязательно для прослушивания.🩵💎🌌"}]}, {"id": "literature", "title": "Рекомендованная литература", "description": "Список книг для углублённой проработки тем курса.", "emoji": "📚", "message_ids": [175354], "messages": [{"id": 175354, "date": "26.03.2026 16:33:07 UTC+00:00", "author": "Лера", "text": "Рекомендую данную литературу.\n\nЧитать лучше в таком порядке:\n\n1. Взрослые дети эмоционально незрелых родителей.\n2. Внутренние семейные системы.\n3. Тело помнит всё."}]}], "timeline": [{"date": "14.03.2026", "title": "День 0: Открытие пространства", "description": "Лера приглашает участников, объясняет правила и просит прислать фото в светлой одежде.", "message_ids": [174896]}, {"date": "15.03.2026", "title": "День 1: Настройка энергии", "description": "Старт курса. Введение практики со свечами — ежедневный ритуал активации на весь курс.", "message_ids": [174907, 174912, 174913, 174914]}, {"date": "16.03.2026", "title": "День 2: Активация жизненных сил", "description": "Работа с тонким планом с 10:30 до 11:30. Медитации перед сном: П function escapeHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

function highlightText(text, query) {
  if (!query) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return escaped.replace(re, '<mark>$1</mark>');
}

function renderMessage(msg, query = '') {
  return `
    <div class="message">
      <div class="message-meta">
        <span class="message-author">${escapeHtml(msg.author || 'Лера')}</span>
        <span>${escapeHtml((msg.date || '').split(' ')[0])}</span>
        <span>#${msg.id}</span>
      </div>
      <div class="message-text">${highlightText(msg.text, query)}</div>
    </div>
  `;
}

function renderOverview(data) {
  const days = data.timeline.length;
  const msgs = data.topics.reduce((s,t) => s + (t.messages||[]).length, 0);
  return `
    <div class="overview">
      <div class="summary-card">
        <strong>О курсе:</strong> ${escapeHtml(data.summary)}
        <div class="participants">
          ${(data.participants||[]).map(p => `<span class="participant">${escapeHtml(p)}</span>`).join('')}
        </div>
      </div>
      <div class="stat-card"><div class="num">${days}</div><div class="label">дней курса</div></div>
      <div class="stat-card"><div class="num">${data.topics.length}</div><div class="label">тем</div></div>
      <div class="stat-card"><div class="num">${msgs}</div><div class="label">сообщений</div></div>
      <div class="stat-card"><div class="num">${data.key_practices.length}</div><div class="label">практик</div></div>
    </div>
  `;
}

function renderTopics(data) {
  return `
    <div class="section-title">📚 Темы курса</div>
    ${data.topics.map((t, i) => `
      <div class="topic-card" id="topic-${t.id}">
        <div class="topic-header" onclick="toggleTopic('${t.id}')">
          <span class="topic-emoji">${t.emoji}</span>
          <div style="flex:1">
            <div class="topic-title">${escapeHtml(t.title)}</div>
            <div class="topic-desc">${escapeHtml(t.description)}</div>
          </div>
          <span class="topic-toggle">${(t.messages||[]).length} сообщ.</span>
        </div>
        <div class="topic-messages" id="tm-${t.id}">
          ${(t.messages||[]).map(m => renderMessage(m)).join('')}
        </div>
      </div>
    `).join('')}
  `;
}

function renderTimeline(data) {
  return `
    <div class="section-title">📅 Хронология</div>
    <div class="timeline">
      ${data.timeline.map(ev => `
        <div class="tl-item">
          <div class="tl-card" onclick="toggleTimeline('${ev.date}')">
            <div class="tl-date">${ev.date}</div>
            <div class="tl-title">${escapeHtml(ev.title)}</div>
            <div class="tl-desc">${escapeHtml(ev.description)}</div>
            <div class="tl-messages" id="tlm-${ev.date.replace(/\./g,'-')}">
              ${(ev.messages||[]).map(m => renderMessage(m)).join('')}
            </div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderPractices(data) {
  return `
    <div class="section-title">⭐ Ключевые практики</div>
    <div class="practices-grid">
      ${data.key_practices.map(p => `<div class="practice-item">${escapeHtml(p)}</div>`).join('')}
    </div>
  `;
}

function renderInsights(data) {
  return `
    <div class="section-title">💡 Главные инсайты</div>
    <div class="insights-list">
      ${data.key_insights.map(ins => `<div class="insight-item">${escapeHtml(ins)}</div>`).join('')}
    </div>
  `;
}

function toggleTopic(id) {
  const el = document.getElementById('tm-' + id);
  el.classList.toggle('open');
}

function toggleTimeline(date) {
  const id = 'tlm-' + date.replace(/\./g,'-');
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function showView(view, data) {
  const main = document.getElementById('main');
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.view === view);
  });

  if (view === 'overview') {
    main.innerHTML = renderOverview(data) + renderPractices(data) + renderInsights(data);
  } else if (view === 'topics') {
    main.innerHTML = renderTopics(data);
  } else if (view === 'timeline') {
    main.innerHTML = renderTimeline(data);
  }
}

function doSearch(query, data) {
  const main = document.getElementById('main');
  if (!query.trim()) {
    showView('overview', data);
    return;
  }
  const q = query.toLowerCase();
  const allMessages = data.topics.flatMap(t => t.messages || []);
  const seen = new Set();
  const results = allMessages.filter(m => {
    if (seen.has(m.id)) return false;
    seen.add(m.id);
    return m.text.toLowerCase().includes(q);
  });

  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));

  if (results.length === 0) {
    main.innerHTML = `<div class="no-results">🔍 Ничего не найдено по запросу «${escapeHtml(query)}»</div>`;
    return;
  }

  main.innerHTML = `
    <div class="section-title">🔍 Результаты: ${results.length} сообщений</div>
    ${results.map(m => renderMessage(m, query)).join('')}
  `;
}

function buildSidebar(data) {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = `
    <div class="nav-section">Навигация</div>
    <div class="nav-item active" data-view="overview" onclick="showView('overview', window.__data)">
      <span class="emoji">🏠</span><span class="label">Обзор</span>
    </div>
    <div class="nav-item" data-view="topics" onclick="showView('topics', window.__data)">
      <span class="emoji">📚</span><span class="label">Темы</span>
      <span class="count">${data.topics.length}</span>
    </div>
    <div class="nav-item" data-view="timeline" onclick="showView('timeline', window.__data)">
      <span class="emoji">📅</span><span class="label">Хронология</span>
      <span class="count">${data.timeline.length}</span>
    </div>

    <div class="nav-section" style="margin-top:16px">Темы</div>
    ${data.topics.map(t => `
      <div class="nav-item" onclick="showView('topics', window.__data); setTimeout(()=>{ document.getElementById('topic-${t.id}')?.scrollIntoView({behavior:'smooth', block:'start'}); toggleTopic('${t.id}'); }, 50)">
        <span class="emoji">${t.emoji}</span>
        <span class="label">${escapeHtml(t.title)}</span>
        <span class="count">${(t.messages||[]).length}</span>
      </div>
    `).join('')}
  `;
}

function init() {
  try {
    // Инициализация Telegram Mini App
    if (window.Telegram && window.Telegram.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
    }

    const data = DATA;
    window.__data = data;

    document.getElementById('header-meta').textContent =
      `${data.period.start} — ${data.period.end} · ${data.participants.length} участников`;

    buildSidebar(data);
    showView('overview', data);

    let timer;
    document.getElementById('search').addEventListener('input', e => {
      clearTimeout(timer);
      timer = setTimeout(() => doSearch(e.target.value, data), 200);
    });
  } catch(e) {
    document.body.innerHTML = `<div style="padding:24px;color:#ff6b6b;font-family:monospace">Error: ${e.message}<br><pre>${e.stack}</pre></div>`;
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
